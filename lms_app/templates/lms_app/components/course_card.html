<a href="{% url 'subject_detail' subject.id %}" class="subject-card interactive-card">
    <div class="card-header-flex">
        <div class="subject-info">
            <h3>{{ subject.name }} {% if subject.code %}<span style="font-size: 0.8em; opacity: 0.8;">({{ subject.code }})</span>{% endif %}</h3>
        </div>
    </div>
    <div class="card-hover-hint">
        دخول للمادة ⬅️
    </div>
</a>
