{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة كلية التربية النوعية - جامعة المنوفية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --surface-dark: rgba(30, 58, 138, 0.15);
            --primary: #1d4ed8;
            --primary-hover: #1e3a8a;
            --primary-glow: rgba(29, 78, 216, 0.5);
            --accent: #d4af37;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('{% static "images/login_bg.jpg" %}');
            background-size: cover;
            background-position: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            margin: 0;
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(29, 78, 216, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: scale(1.02);
            box-shadow: 0 6px 12px var(--primary-glow);
        }

        .error-message {
            background-color: var(--error-bg);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: shake 0.4s ease-in-out;
        }
        
        .login-logo {
            max-width: 120px;
            height: auto;
            display: block;
            margin: 0 auto 1rem auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <img src="{% static 'images/logo_login.png' %}" alt="University Logo" class="login-logo mb-3">
            <h1 style="font-size: 1.5rem; line-height: 1.4;">منصة كلية التربية النوعية<br>جامعة المنوفية</h1>
            <p>الرجاء تسجيل الدخول إلى حسابك</p>
        </div>

        {% if error_message %}
            <div class="error-message">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
                <span>{{ error_message }}</span>
            </div>
        {% elif form.errors %}
            <div class="error-message">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
                <span>اسم المستخدم أو كلمة المرور غير صحيحة. يرجى المحاولة مرة أخرى.</span>
            </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_username">اسم المستخدم</label>
                <input type="text" name="username" class="form-control" id="id_username" required autofocus placeholder="أدخل اسم المستخدم">
            </div>

            <div class="form-group">
                <label for="id_password">كلمة المرور</label>
                <input type="password" name="password" class="form-control" id="id_password" required placeholder="أدخل كلمة المرور">
            </div>

            <button type="submit" class="btn-primary">تسجيل الدخول</button>
        </form>
    </div>

</body>
</html>
