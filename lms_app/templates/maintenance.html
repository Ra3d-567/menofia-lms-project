{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحت الصيانة - منصة كلية التربية النوعية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800&family=Inter:wght@500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8fafc;
            color: #1e293b;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .maintenance-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-family: 'Cairo', sans-serif;
            color: #ef4444;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1rem;
            color: #64748b;
            line-height: 1.6;
        }
        .icon {
            font-size: 4rem;
            color: #ef4444;
            margin-bottom: 20px;
        }
        .btn-refresh {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 25px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-refresh:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="maintenance-card">
        <i class="fas fa-tools icon"></i>
        <h1>النظام تحت الصيانة</h1>
        <p>نعتذر عن الإزعاج. نقوم حالياً ببعض أعمال الصيانة والتحديثات الضرورية على النظام لضمان تقديم خدمة أفضل لكم.</p>
        <p><strong>يرجى المحاولة مرة أخرى لاحقاً.</strong></p>
        <a href="javascript:location.reload()" class="btn-refresh"><i class="fas fa-sync-alt mr-2"></i> تحديث الصفحة</a>
    </div>
</body>
</html>
